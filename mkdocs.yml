site_name: SILO Framework
theme:
  name: material
  logo: logo.png
  favicon: logo.png
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.expand
    - toc.follow

plugins:
  - search
  - i18n:
      default_language: en
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ru
          name: Русский
          build: true
          nav:
            - Добро пожаловать: index.ru.md
            - 🚀 Быстрый старт:
                - Руководство по быстрому старту: guide/quickstart.ru.md
                - Ваш первый скилл: tutorials/first-skill.ru.md
            - 📖 Руководства пользователя:
                - Написание скиллов: guide/writing_skills.ru.md
                - Обзор безопасности: guide/security-overview.ru.md
                - Обзор архитектуры: guide/architecture.ru.md
                - Динамическая маршрутизация (BM25): guide/routing.ru.md
                - Интерактивные подтверждения: guide/interactive.ru.md
                - "Глубокое погружение: Песочница": guide/security.ru.md
            - 🛠️ Справочник:
                - Команды CLI: reference/cli.ru.md
                - SDK для скиллов: reference/skill-sdk.ru.md
                - Конфигурация (silo.yaml): reference/config.ru.md
            - 🔌 Интеграции:
                - Развертывание MCP: integrations/mcp.ru.md
                - Claude Desktop: integrations/claude.ru.md
                - HashiCorp Vault: integrations/vault.ru.md
                - Кастомные оркестраторы: integrations/custom.ru.md

nav:
  - Welcome: index.md
  - 🚀 Getting Started:
      - Quickstart Guide: guide/quickstart.md
      - Your First Skill: tutorials/first-skill.md
  - 📖 User Guides:
      - Writing Skills: guide/writing_skills.md
      - Security Overview: guide/security-overview.md
      - Architecture Overview: guide/architecture.md
      - Dynamic Routing (BM25): guide/routing.md
      - Interactive Approvals: guide/interactive.md
      - "Deep Dive: Sandboxing": guide/security.md
  - 🛠️ Reference:
      - CLI Commands: reference/cli.md
      - Skill SDK: reference/skill-sdk.md
      - Configuration (silo.yaml): reference/config.md
  - 🔌 Integrations:
      - MCP Deployment: integrations/mcp.md
      - Claude Desktop: integrations/claude.md
      - HashiCorp Vault: integrations/vault.md
      - Custom Orchestrators: integrations/custom.md

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: Русский
      link: /ru/
      lang: ru

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
