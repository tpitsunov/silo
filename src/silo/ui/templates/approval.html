<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.L.O. | Action Approval</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --primary: #5865f2;
            --danger: #ed4245;
            --success: #3ba55c;
            --text: #ffffff;
            --text-dim: #b9bbbe;
            --border: #2f3136;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
        }

        h1 { margin-top: 0; font-size: 1.5rem; color: var(--primary); }
        p { color: var(--text-dim); line-height: 1.5; }

        .action-box {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            margin: 1.5rem 0;
            border-left: 4px solid var(--primary);
            word-break: break-all;
        }

        .args { color: #f8f8f2; margin-top: 0.5rem; display: block; }

        .buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            flex: 1;
            padding: 0.8rem;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .btn-approve { background-color: var(--success); color: white; }
        .btn-reject { background-color: var(--danger); color: white; }

        .success-msg {
            display: none;
            text-align: center;
            color: var(--success);
        }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <h1>🛡️ Action Approval</h1>
        <p>An AI agent is requesting permission to execute a critical command in <strong>{skill_name}</strong>.</p>
        
        <div class="action-box">
            <span style="color: var(--primary)">&gt; {cmd_name}</span>
            <span class="args">{args_json}</span>
        </div>

        <div class="buttons">
            <button class="btn-reject" onclick="respond(false)">Reject</button>
            <button class="btn-approve" onclick="respond(true)">Approve</button>
        </div>
    </div>

    <div class="success-msg" id="msg">
        <h2>Decision Recorded</h2>
        <p>You can close this tab now.</p>
    </div>

    <script>
        async function respond(approved) {
            try {
                const res = await fetch('/respond', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ approved, nonce: "{nonce}" })
                });
                if (res.ok) {
                    document.getElementById('main-card').style.display = 'none';
                    document.getElementById('msg').style.display = 'block';
                }
            } catch (err) {
                alert("Failed to send response: " + err);
            }
        }
    </script>
</body>
</html>
