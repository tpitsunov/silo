site_name: SILO Framework
site_description: A lightweight framework for building secure, isolated, and LLM-ready AI skills.
site_author: Timur Pitsunov
site_url: https://tpitsunov.github.io/silo/
repo_url: https://github.com/tpitsunov/silo

theme:
  name: material
  language: en
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - i18n.alternate

extra:
  alternate:
    - name: English
      link: ./
      lang: en
    - name: Русский
      link: ./ru/
      lang: ru

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
        - locale: ru
          name: Русский

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Writing Skills: writing_skills.md
  - Security & Approvals: security.md
  - CLI Reference: cli.md
  - MCP Deployment: mcp.md
