site_name: SILO Framework
theme:
  name: material
  logo: logo.png
  favicon: logo.png
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.expand
    - toc.follow

plugins:
  - search
  - i18n:
      default_language: en
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ru
          name: Русский
          build: true

nav:
  - Welcome: index.md
  - 🚀 Getting Started:
      - Quickstart Guide: guide/quickstart.md
      - Your First Skill: tutorials/first-skill.md
  - 📖 User Guides:
      - Writing Skills: guide/writing_skills.md
      - Security Overview: guide/security-overview.md
      - Architecture Overview: guide/architecture.md
      - Dynamic Routing (BM25): guide/routing.md
      - Interactive Approvals: guide/interactive.md
      - Deep Dive: Sandboxing: guide/security.md
  - 🛠️ Reference:
      - CLI Commands: reference/cli.md
      - Skill SDK: reference/skill-sdk.md
      - Configuration (silo.yaml): reference/config.md
  - 🔌 Integrations:
      - MCP Deployment: integrations/mcp.md
      - Claude Desktop: integrations/claude.md
      - HashiCorp Vault: integrations/vault.md
      - Custom Orchestrators: integrations/custom.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
